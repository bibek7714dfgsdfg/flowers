<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Gift For You 🌸</title>
    <style>
        :root {
            --bg-color: #0f261d; /* Deep aesthetic green from the video */
            --accent-pink: #ffb7c5;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }

        body {
            background: radial-gradient(circle at center, #16382b 0%, #091712 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Floating background flower petals */
        .petal {
            position: absolute;
            background: var(--accent-pink);
            border-radius: 150% 0 150% 0;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Main Container for Mobile */
        .gift-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        /* Animated Bouquet Frame */
        .bouquet-container {
            width: 260px;
            height: 260px;
            position: relative;
            animation: sway 4s ease-in-out infinite alternate;
        }

        /* Feel free to replace this placeholder with a transparent digital bouquet PNG */
        .bouquet-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.4));
        }

        @keyframes sway {
            0% { transform: translateY(0) rotate(-3deg); }
            100% { transform: translateY(-10px) rotate(3deg); }
        }

        /* Interactive Card Styles */
        .postcard {
            width: 100%;
            background: #fffdf9; /* Soft paper texture tone */
            color: #2c3e50;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            padding: 25px;
            transform: scale(0.9);
            opacity: 0;
            display: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
        }

        .postcard.reveal {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        .postcard-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7f8c8d;
            margin-bottom: 15px;
            border-bottom: 1px dashed #bdc3c7;
            padding-bottom: 8px;
        }

        .polaroid-gallery {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .polaroid {
            background: white;
            padding: 8px 8px 16px 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transform: rotate(-2deg);
            flex-shrink: 0;
            width: 110px;
        }
        .polaroid:nth-child(even) {
            transform: rotate(3deg);
        }

        .polaroid img {
            width: 100%;
            height: 90px;
            object-fit: cover;
        }

        .letter-body {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #34495e;
            font-style: italic;
            margin-bottom: 20px;
        }

        /* Music Player Integration */
        .spotify-embed {
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
        }

        /* Action Buttons */
        .btn-open {
            background: linear-gradient(135deg, #e0a3b3 0%, #cc7a8c 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(204,122,140,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-open:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <script>
        for (let i = 0; i < 15; i++) {
            let petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 15 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDelay = Math.random() * 5 + 's';
            petal.style.animationDuration = Math.random() * 5 + 6 + 's';
            document.body.appendChild(petal);
        }
    </script>

    <div class="gift-wrapper">
        
        <div class="bouquet-container">
            <img class="bouquet-img" src="https://i.imgur.com/8QpYm8M.png" alt="Digital Bouquet Layout" onerror="this.src='https://images.unsplash.com/photo-1561181286-d3fee7d55364?w=400&auto=format&fit=crop'; this.style.borderRadius='50%'">
        </div>

        <button class="btn-open" id="openBtn" onclick="revealGift()">Open Note ✨</button>

        <div class="postcard" id="giftCard">
            <div class="postcard-header">
                To: My Favorite Person <br>
                From: Someone Who Cares
            </div>

            <div class="polaroid-gallery">
                <div class="polaroid">
                    <img src="https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=150" alt="Memory 1">
                </div>
                <div class="polaroid">
                    <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=150" alt="Memory 2">
                </div>
            </div>

            <div class="letter-body">
                "I don't always have the perfect words to tell you how incredible you are, so I built you this digital garden instead. I hope these flowers bring a little smile to your day."
            </div>

            <div class="spotify-embed">
                <iframe src="https://open.spotify.com/embed/track/1PtGf0E4g76f4e6DIsWpZ1?utm_source=generator&theme=0" 
                        width="100%" height="80" frameBorder="0" allowfullscreen="" 
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
                </iframe>
            </div>
        </div>

    </div>

    <script>
        function revealGift() {
            const card = document.getElementById('giftCard');
            const btn = document.getElementById('openBtn');
            
            card.classList.add('reveal');
            btn.style.display = 'none'; // Closes out the view button once viewed
        }
    </script>
</body>
</html>
